{% extends 'base.html' %}

{% block content %}
    <h1>Configuration</h1>

    <form method="POST" action="{{ url_for('config_step3') }}">
        <h2>Step 3: Select Taiga User Story</h2>

        <p>Selected Project: <strong>{{ config.taiga_project_slug }}</strong></p>

        <div class="form-group">
            <label for="taiga_user_story_id">Taiga User Story</label>
            <select id="taiga_user_story_id" name="taiga_user_story_id" style="width: 100%; padding: 0.5rem;" required>
                <option value="" disabled selected>Select a User Story...</option>
                {% for us in user_stories %}
                    <option value="{{ us.id }}" data-ref="{{ us.ref }}" {% if config.taiga_user_story_id == us.id %}selected{% endif %}>
                        #{{ us.ref }} - {{ us.subject }}
                    </option>
                {% endfor %}
            </select>
        </div>
        <!-- Hidden input to pass the ref along -->
        <input type="hidden" id="taiga_user_story_ref" name="taiga_user_story_ref" value="{{ config.taiga_user_story_ref or '' }}">

        <button type="submit" onclick="document.getElementById('taiga_user_story_ref').value = document.getElementById('taiga_user_story_id').options[document.getElementById('taiga_user_story_id').selectedIndex].getAttribute('data-ref');">Save Final Configuration</button>
    </form>
{% endblock %}
